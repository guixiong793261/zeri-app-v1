name: Build APK Verbose

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git python3-dev openjdk-17-jdk
        sudo apt-get install -y automake libtool pkg-config libncurses5-dev cmake libffi-dev libssl-dev
    
    - name: Set log level
      run: |
        echo "[buildozer]" > buildozer.spec.new
        echo "log_level = 2" >> buildozer.spec.new
        cat buildozer.spec >> buildozer.spec.new
        mv buildozer.spec.new buildozer.spec
    
    - name: Build APK
      run: |
        buildozer android debug 2>&1 | tee build.log
      continue-on-error: true
    
    - name: Check build status
      run: |
        echo "=== Build completed ==="
        ls -la bin/ 2>/dev/null || echo "bin directory not found or empty"
        echo "=== Last 200 lines of log ==="
        tail -200 build.log
    
    - name: Upload logs
      uses: actions/upload-artifact@v4
      with:
        name: build-verbose-logs
        path: |
          build.log
          .buildozer/android/platform/build-*/build.log
        retention-days: 7
