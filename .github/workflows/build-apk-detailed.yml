name: Build APK with Detailed Logs

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        pip list
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git python3-dev openjdk-17-jdk
        sudo apt-get install -y automake libtool pkg-config libncurses5-dev cmake libffi-dev libssl-dev
    
    - name: Build APK
      run: |
        echo "=== Starting build ==="
        buildozer android debug 2>&1 | tee build.log
        echo "=== Build completed ==="
        cat build.log
    
    - name: Upload logs
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build.log
        retention-days: 7
