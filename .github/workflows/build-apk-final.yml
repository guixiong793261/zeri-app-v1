name: Build APK Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git python3-dev openjdk-17-jdk
        sudo apt-get install -y automake libtool pkg-config libncurses5-dev cmake libffi-dev libssl-dev
    
    - name: Build APK
      run: |
        buildozer android debug
        ls -la bin/ 2>/dev/null || echo "bin directory not found"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: zeri-app-apk
        path: bin/*.apk
        retention-days: 30
